      <stop offset="1" stop-color="#79B7AB"/>
    </linearGradient>
    <linearGradient id="ink" x1="56" y1="44" x2="136" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1FFFC"/>
      <stop offset="1" stop-color="#D8F6EF"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="160" height="160" rx="40" fill="url(#bg2)"/>
  <rect x="16" y="16" width="160" height="160" rx="40" stroke="#0E3934" stroke-opacity="0.25" stroke-width="2"/>

  <!-- "文" 的顶部点与横 -->
